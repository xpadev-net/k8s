apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: osk-tidb-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xpadev-net/k8s
    targetRevision: HEAD
    path: osk-tidb/cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      enabled: true
