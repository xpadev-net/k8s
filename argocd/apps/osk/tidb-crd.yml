apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: osk-tidb-crd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xpadev-net/k8s
    targetRevision: HEAD
    path: osk-tidb/crd
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
