apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: osk-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xpadev-net/k8s.git
    targetRevision: master
    path: argocd/apps/osk
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
